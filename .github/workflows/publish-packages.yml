name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: "Optional package version override (for example 1.2.13 or 1.2.13-rc1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ github.event.inputs.packageVersion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore Release Package Projects
        shell: pwsh
        run: |
          . ./tools/release-package-manifest.ps1
          $repoRoot = Get-ReleaseRepoRoot
          $restoreSources = @("https://api.nuget.org/v3/index.json")
          $localPackages = Join-Path $repoRoot "nupkg"
          if (Test-Path $localPackages) {
            $restoreSources += $localPackages
          }

          foreach ($project in Get-ReleasePackageProjects) {
            $projectPath = Join-Path $repoRoot $project
            $restoreArgs = @("restore", $projectPath)
            foreach ($source in $restoreSources) {
              $restoreArgs += @("--source", $source)
            }

            dotnet @restoreArgs
            if ($LASTEXITCODE -ne 0) {
              throw "dotnet restore failed for $project"
            }
          }

      - name: Pack Release Packages
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION)) {
            pwsh -File ./tools/pack-release-packages.ps1 -OutputDir artifacts/packages
          }
          else {
            pwsh -File ./tools/pack-release-packages.ps1 -OutputDir artifacts/packages -PackageVersion $env:PACKAGE_VERSION
          }

      - name: Publish NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY secret is required."
          }

          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION)) {
            pwsh -File ./tools/publish-release-packages.ps1 -PackageOutput artifacts/packages -Source https://api.nuget.org/v3/index.json
          }
          else {
            pwsh -File ./tools/publish-release-packages.ps1 -PackageOutput artifacts/packages -PackageVersion $env:PACKAGE_VERSION -Source https://api.nuget.org/v3/index.json
          }

      - name: Publish GitHub Packages
        shell: pwsh
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $apiKey = $env:GITHUB_PACKAGES_TOKEN
          if ([string]::IsNullOrWhiteSpace($apiKey)) {
            $apiKey = $env:GITHUB_TOKEN
          }

          if ([string]::IsNullOrWhiteSpace($apiKey)) {
            throw "No GitHub Packages token available. Set GITHUB_PACKAGES_TOKEN secret."
          }

          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION)) {
            pwsh -File ./tools/publish-release-packages.ps1 -PackageOutput artifacts/packages -Source https://nuget.pkg.github.com/haxxornulled/index.json -ApiKey $apiKey
          }
          else {
            pwsh -File ./tools/publish-release-packages.ps1 -PackageOutput artifacts/packages -PackageVersion $env:PACKAGE_VERSION -Source https://nuget.pkg.github.com/haxxornulled/index.json -ApiKey $apiKey
          }

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          . ./tools/release-package-manifest.ps1

          $repoRoot = Get-ReleaseRepoRoot
          $version = $env:RELEASE_TAG
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          $packageLines = (Get-ReleasePackageVersionInfo | ForEach-Object {
            "* $($_.PackageId): published"
          }) -join [Environment]::NewLine

          $notesPath = Join-Path $repoRoot "artifacts/release-notes-$($env:RELEASE_TAG).md"
          $notesDir = Split-Path $notesPath -Parent
          New-Item -ItemType Directory -Path $notesDir -Force | Out-Null

          @"
          # VapeCache $version

          ### NuGet Publish Status
          $packageLines

          ### GitHub Packages Publish Status
          $packageLines

          ### Validation
          * publish-packages workflow: passed
          * tag: $($env:RELEASE_TAG)
          "@ | Set-Content -LiteralPath $notesPath -Encoding UTF8

          & gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          $exists = ($LASTEXITCODE -eq 0)

          if ($exists) {
            & gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TAG --notes-file $notesPath --latest
          }
          else {
            & gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TAG --notes-file $notesPath --latest
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release publish failed for $($env:RELEASE_TAG)."
          }
