name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build (must start with v, for example v1.1.0 or v1.1.0-rc1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-pack-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.release_tag }}" } else { "${{ github.ref_name }}" }
          if ([string]::IsNullOrWhiteSpace($tag))
          {
              throw "Release tag is required."
          }

          if ($tag -notlike "v*")
          {
              throw "Release tag must start with 'v'."
          }

          $packageVersion = $tag.Substring(1)
          if ([string]::IsNullOrWhiteSpace($packageVersion))
          {
              throw "Release tag must contain a version after 'v'."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VapeCache.sln

      - name: Build
        run: dotnet build -c Release --no-restore VapeCache.sln

      - name: Unit tests
        run: dotnet test -c Release --no-build VapeCache.Tests/VapeCache.Tests.csproj

      - name: API integration tests
        run: dotnet test -c Release --no-build VapeCache.ApiTests/VapeCache.ApiTests.csproj

      - name: Perf gates tests
        run: dotnet test -c Release VapeCache.PerfGates.Tests/VapeCache.PerfGates.Tests.csproj

      - name: Vulnerability scan
        shell: pwsh
        run: |
          . ./tools/release-package-manifest.ps1
          foreach ($project in Get-ReleasePackageProjects)
          {
              dotnet list $project package --vulnerable --include-transitive
              if ($LASTEXITCODE -ne 0)
              {
                  throw "Vulnerability scan failed for $project"
              }
          }

      - name: Pack
        run: pwsh -File tools/pack-release-packages.ps1 -OutputDir artifacts/packages -PackageVersion "${{ steps.release_tag.outputs.package_version }}"

      - name: Package smoke test
        run: pwsh -File tools/package-smoke.ps1 -PackageOutput artifacts/packages -PackageId VapeCache

      - name: Generate checksums
        run: |
          cd artifacts/packages
          sha256sum *.nupkg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ steps.release_tag.outputs.tag }}
          path: artifacts/packages/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ contains(steps.release_tag.outputs.package_version, '-') }}
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/SHA256SUMS.txt
