name: Commit Notify

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  notify-contributors:
    if: github.event_name != 'push' || github.event.deleted == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build notification body
        shell: pwsh
        run: |
          $subscriberPath = ".github/commit-notify-subscribers.txt"
          $handles = [ordered]@{}

          if (Test-Path $subscriberPath)
          {
              foreach ($line in Get-Content $subscriberPath)
              {
                  $trimmed = $line.Trim()
                  if (-not $trimmed -or $trimmed.StartsWith('#'))
                  {
                      continue
                  }

                  if ($trimmed.StartsWith('@'))
                  {
                      $trimmed = $trimmed.Substring(1)
                  }

                  if ($trimmed -match '^[A-Za-z0-9][A-Za-z0-9-]{0,38}$')
                  {
                      $normalized = $trimmed.ToLowerInvariant()
                      $handles[$normalized] = $normalized
                  }
              }
          }

          foreach ($email in git log --format='%ae' --all)
          {
              $trimmed = $email.Trim()
              if ($trimmed -match '^(?:\d+\+)?(?<user>[A-Za-z0-9-]+)@users\.noreply\.github\.com$')
              {
                  $normalized = $Matches['user'].ToLowerInvariant()
                  if ($normalized -ne 'github-actions[bot]')
                  {
                      $handles[$normalized] = $normalized
                  }
              }
          }

          $mentions = @($handles.Values | ForEach-Object { "@$_" })
          $payload = Get-Content $env:GITHUB_EVENT_PATH | ConvertFrom-Json
          $commitLines = New-Object System.Collections.Generic.List[string]
          $isReleaseTag = $false

          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -like 'v*')
          {
              $isReleaseTag = $true
          }
          elseif ($env:GITHUB_EVENT_NAME -eq 'push' -and $payload.ref -and [string]$payload.ref -like 'refs/tags/v*')
          {
              $isReleaseTag = $true
          }

          if ($env:GITHUB_EVENT_NAME -eq 'push' -and $payload.commits)
          {
              foreach ($commit in @($payload.commits))
              {
                  $sha = if ($commit.id.Length -ge 7) { $commit.id.Substring(0, 7) } else { $commit.id }
                  $message = ($commit.message -split "`r?`n")[0]
                  $author = if ($commit.author.name) { $commit.author.name } else { 'unknown' }
                  $commitLines.Add("- $sha $author: $message")
              }
          }

          if ($commitLines.Count -eq 0)
          {
              $sha = if ($env:GITHUB_SHA.Length -ge 7) { $env:GITHUB_SHA.Substring(0, 7) } else { $env:GITHUB_SHA }
              $commitLines.Add("- $sha Commit notification triggered.")
          }

          $compareUrl = if ($env:GITHUB_EVENT_NAME -eq 'push' -and $payload.compare) {
              [string]$payload.compare
          }
          else
          {
              "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/commit/$($env:GITHUB_SHA)"
          }

          $bodyLines = New-Object System.Collections.Generic.List[string]
          $issueTitle = if ($isReleaseTag) { 'Release Notifications' } else { 'Commit Notifications' }
          $issueIntro = if ($isReleaseTag) {
              'Automated release notification feed. New comments are added after v* tag pushes.'
          }
          else
          {
              'Automated commit notification feed. New comments are added after pushes to the default branch.'
          }

          if ($mentions.Count -gt 0)
          {
              $bodyLines.Add(($mentions -join ' '))
          }
          else
          {
              $bodyLines.Add('_No notification recipients were resolved. Update .github/commit-notify-subscribers.txt or use a GitHub noreply commit email._')
          }

          $bodyLines.Add('')

          if ($isReleaseTag)
          {
              $bodyLines.Add("New release tag '$($env:GITHUB_REF_NAME)' was pushed.")
          }
          else
          {
              $bodyLines.Add("New commits landed on branch '$($env:GITHUB_REF_NAME)'.")
          }

          $bodyLines.Add('')
          $bodyLines.Add("- Actor: @$($env:GITHUB_ACTOR)")
          if ($isReleaseTag)
          {
              $bodyLines.Add("- Release tag: $($env:GITHUB_REF_NAME)")
          }
          $bodyLines.Add("- Compare: $compareUrl")
          $bodyLines.Add("- Workflow run: $($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)")
          $bodyLines.Add('')
          $bodyLines.Add('**Commits**')
          $bodyLines.AddRange($commitLines)

          Set-Content -Path commit-notify-body.md -Value ($bodyLines -join "`n")
          Set-Content -Path commit-notify-title.txt -Value $issueTitle
          Set-Content -Path commit-notify-issue-body.md -Value $issueIntro

      - name: Post commit notification
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = fs.readFileSync('commit-notify-title.txt', 'utf8').trim();
            const issueBody = fs.readFileSync('commit-notify-issue-body.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commentBody = fs.readFileSync('commit-notify-body.md', 'utf8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            let issue = issues.find((candidate) => candidate.title === title);

            if (!issue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: issueBody
              });

              issue = created.data;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: commentBody
            });
