name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.repository == 'haxxornulled/VapeCache-Enterprise'
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: CI Validation
        shell: pwsh
        run: |
          ./tools/ci-validate.ps1 -Configuration Debug -UsePublicSourcesOnly
